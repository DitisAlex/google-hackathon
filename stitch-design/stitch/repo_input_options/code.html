<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Repo Analyzer - Input</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 md:px-10 py-3">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined">analytics</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Repo Analyzer</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="hidden md:flex items-center gap-9">
<a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">History</a>
<a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">Settings</a>
</div>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4 md:p-10">
<div class="w-full max-w-[640px] flex flex-col gap-8">
<div class="text-center space-y-2">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-slate-900 dark:text-white">Start New Analysis</h1>
<p class="text-slate-500 dark:text-slate-400">Generate comprehensive documentation from any GitHub repository in seconds.</p>
</div>
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 md:p-10">
<form class="space-y-8">
<div class="space-y-4">
<label class="block">
<span class="text-slate-900 dark:text-slate-200 text-sm font-semibold mb-2 block">GitHub Repository URL</span>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">link</span>
</div>
<input class="form-input block w-full pl-11 pr-4 py-4 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="https://github.com/user/repo" type="text"/>
</div>
</label>
</div>
<div class="space-y-4">
<h3 class="text-slate-900 dark:text-slate-200 text-sm font-semibold">Analysis Options</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex items-center p-4 rounded-lg border border-slate-200 dark:border-slate-800 hover:border-primary/50 dark:hover:border-primary/50 cursor-pointer transition-colors group">
<input checked="" class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary h-5 w-5 bg-transparent" type="checkbox"/>
<div class="ml-3">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Detailed Summary</span>
</div>
</label>
<label class="flex items-center p-4 rounded-lg border border-slate-200 dark:border-slate-800 hover:border-primary/50 dark:hover:border-primary/50 cursor-pointer transition-colors group">
<input checked="" class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary h-5 w-5 bg-transparent" type="checkbox"/>
<div class="ml-3">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Code Architecture</span>
</div>
</label>
<label class="flex items-center p-4 rounded-lg border border-slate-200 dark:border-slate-800 hover:border-primary/50 dark:hover:border-primary/50 cursor-pointer transition-colors group">
<input class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary h-5 w-5 bg-transparent" type="checkbox"/>
<div class="ml-3">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Installation Guide</span>
</div>
</label>
<label class="flex items-center p-4 rounded-lg border border-slate-200 dark:border-slate-800 hover:border-primary/50 dark:hover:border-primary/50 cursor-pointer transition-colors group">
<input class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary h-5 w-5 bg-transparent" type="checkbox"/>
<div class="ml-3">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">API Reference</span>
</div>
</label>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">bolt</span>
                            Analyze Repository
                        </button>
</form>
</div>
<div class="flex items-center justify-center gap-6 text-slate-400 dark:text-slate-600">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-xs font-medium uppercase tracking-wider">Secure</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-lg">auto_awesome</span>
<span class="text-xs font-medium uppercase tracking-wider">AI Powered</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-lg">speed</span>
<span class="text-xs font-medium uppercase tracking-wider">Fast</span>
</div>
</div>
</div>
</main>
<footer class="p-6 text-center border-t border-slate-200 dark:border-slate-800">
<p class="text-slate-500 dark:text-slate-500 text-sm">© 2024 Repo Analyzer. Powered by advanced static code analysis.</p>
</footer>
</div>
</div>
</body></html>
